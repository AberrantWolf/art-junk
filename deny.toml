[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
]
confidence-threshold = 0.9

# `epaint_default_fonts` bundles Ubuntu Font (UFL-1.0) and SIL Open Font License
# 1.1 font assets alongside its MIT/Apache code. The font licenses permit
# redistribution on the terms we already ship under; scope the exception to
# this crate so it can't silently expand.
[[licenses.exceptions]]
name = "epaint_default_fonts"
allow = ["OFL-1.1", "LicenseRef-UFL-1.0"]

[advisories]
version = 2
yanked = "deny"
ignore = [
    # `paste` is unmaintained but only reaches us transitively via
    # `metal -> wgpu-hal -> wgpu` on macOS/iOS GPU backends. We cannot drop
    # it without a wgpu major bump; the advisory is informational (no CVE).
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are referenced by `path` alone; cargo encodes that
# as a `*` version. We never publish these with wildcards — the ban is for
# third-party deps only.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
