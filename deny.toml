[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
]
confidence-threshold = 0.9

[advisories]
version = 2
yanked = "deny"
ignore = [
    # `paste` is unmaintained but only reaches us transitively via
    # `metal -> wgpu-hal -> wgpu` on macOS/iOS GPU backends. We cannot drop
    # it without a wgpu major bump; the advisory is informational (no CVE).
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
